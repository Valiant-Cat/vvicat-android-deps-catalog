name: Deploy

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, for example 0.0.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate catalog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate catalog generation
        run: ./gradlew generateCatalogAsToml --warning-mode all

      - name: Publish catalog to local Maven
        run: ./gradlew publishToMavenLocal --warning-mode all

      - name: Validate example project
        run: ./gradlew -p example testDebugUnitTest --warning-mode all

  publish:
    name: Publish catalog
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve publish version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION_NAME="${{ inputs.version }}"
          else
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "VERSION_CATALOG_VERSION=${VERSION_NAME}" >> "$GITHUB_ENV"

      - name: Publish catalog to Maven
        env:
          MAVEN_URL: ${{ secrets.MAVEN_URL }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: ./gradlew publish --warning-mode all

      - name: Verify published catalog locally
        run: |
          ./gradlew publishToMavenLocal --warning-mode all
          ./gradlew -p example testDebugUnitTest --warning-mode all

      - name: Update README published version
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION_NAME"]
          path = Path("README.md")
          text = path.read_text()

          text = re.sub(
              r"<!-- latest-version-start -->.*?<!-- latest-version-end -->",
              f"<!-- latest-version-start -->\n当前发布版本：`{version}`\n<!-- latest-version-end -->",
              text,
              flags=re.S,
          )

          before_structure, separator, after_structure = text.partition("## 仓库结构")
          before_structure = re.sub(
              r"com\.vvicat\.android:deps-catalog:[0-9]+(?:\.[0-9]+){2}(?:[-+][A-Za-z0-9._-]+)?",
              f"com.vvicat.android:deps-catalog:{version}",
              before_structure,
          )
          text = before_structure + separator + after_structure
          path.write_text(text)
          PY

      - name: Commit README version update
        run: |
          if git diff --quiet -- README.md; then
            echo "README version is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update README for ${VERSION_NAME}"
          git push origin HEAD:main
